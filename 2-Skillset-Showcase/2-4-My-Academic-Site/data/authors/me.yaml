bio: |
  Evelyn Du is a quantitative researcher with demonstrated expertise in the
  design and implementation of optimization-driven, system-level decision
  frameworks. Her work integrates machine learning, statistical inference,
  and computational optimization to support high-stakes decision making
  across finance, healthcare AI, and secure digital infrastructure.

  She has contributed to peer-reviewed research and patented systems spanning
  financial forecasting, intelligent medical devices, and AI-assisted risk
  modeling. Evelyn’s research emphasizes trustworthy, scalable, and
  verifiable decision systems that bridge rigorous theory with real-world
  deployment, advancing data-driven solutions of national and societal
  importance.
