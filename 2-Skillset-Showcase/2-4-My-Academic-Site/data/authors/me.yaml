experience:
  - role: Quantitative Alpha Research Intern
    org: American Mutual Fund
    location: New York, NY, USA
    start: 2025-06-01
    end: 2025-08-31
    summary: |
      Designed and backtested medium-term alpha strategies for structured products and fixed income portfolios
      using alternative datasets. Applied Bayesian regression, LSTM, and neural networks across multiple
      market regimes (2018–2024), improving Sharpe ratio by 0.25. Prototyped a transformer-based LLM
      for constrained portfolio optimization, achieving 12% volatility reduction and improved
      risk-adjusted returns. Collaborated with the Portfolio Analytics Group to integrate LLM pipelines
      into Aladdin.

  - role: Algorithm Project Leader
    org: Aqumon
    location: China
    start: 2020-06-01
    end: 2020-12-31
    summary: |
      Led algorithmic research projects on high-frequency trading risk analysis, processing 10M+ transaction
      records. Built decision-tree and econometric models to identify systematic risk points and improve
      backtesting performance (>50% yield). Established standardized data pipelines and documentation
      for large-scale unstructured financial datasets, significantly improving reproducibility and
      onboarding efficiency across teams.


